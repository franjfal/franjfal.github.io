<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Imagen destacada PageRank</title>
  <desc id="desc">Red dirigida con nodos e indicación del algoritmo PageRank.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#d9eaff"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90bcff"/>
      <stop offset="100%" stop-color="#2459c7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#758bb7"/>
    </marker>
  </defs>
  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <rect x="42" y="42" width="1116" height="546" rx="28" fill="#ffffff" opacity="0.95"/>
  <g stroke="#758bb7" stroke-width="7" fill="none" marker-end="url(#arrow)">
    <path d="M280 230 C360 160, 470 155, 560 208"/>
    <path d="M285 365 C400 440, 520 432, 590 320"/>
    <path d="M615 212 C732 160, 842 178, 928 260"/>
    <path d="M613 315 C723 360, 814 420, 906 452"/>
    <path d="M918 452 C765 520, 515 520, 320 390"/>
  </g>
  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" text-anchor="middle">
    <circle cx="230" cy="235" r="58" fill="url(#node)"/>
    <text x="230" y="246" font-size="42">🏠</text>
    <circle cx="260" cy="380" r="50" fill="#aacdff"/>
    <text x="260" y="390" font-size="36">📰</text>
    <circle cx="610" cy="255" r="76" fill="#2459c7"/>
    <text x="610" y="268" font-size="54">🌐</text>
    <circle cx="950" cy="270" r="56" fill="#94bcff"/>
    <text x="950" y="281" font-size="40">🎓</text>
    <circle cx="940" cy="458" r="46" fill="#c8ddff"/>
    <text x="940" y="468" font-size="32">✉️</text>
  </g>
  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="90" y="112" font-size="24" font-weight="700" fill="#2459c7">Matemáticas experimentales</text>
    <text x="90" y="168" font-size="56" font-weight="800" fill="#10213a">Algoritmo PageRank</text>
    <text x="90" y="216" font-size="28" fill="#4b5e7a">Una visualización pedagógica con grafos, matrices e iteraciones.</text>
    <text x="90" y="520" font-size="30" font-weight="700" fill="#153057">G = αS + (1-α) · (1/n)11ᵀ</text>
  </g>
</svg>