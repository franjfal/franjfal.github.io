<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
  <title id="title">Cabecera PageRank</title>
  <desc id="desc">Ilustración con una red dirigida y la fórmula del algoritmo PageRank.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#dfeeff"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8bb8ff"/>
      <stop offset="100%" stop-color="#2459c7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6f87b7"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1d3557" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1600" height="700" rx="32" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="72" y="76" width="1456" height="548" rx="32" fill="#ffffff" opacity="0.92"/>
  </g>

  <g stroke="#6f87b7" stroke-width="8" fill="none" marker-end="url(#arrow)">
    <path d="M360 245 C470 145, 610 135, 720 190"/>
    <path d="M385 420 C520 500, 670 470, 740 340"/>
    <path d="M760 215 C870 170, 1020 180, 1120 260"/>
    <path d="M760 305 C885 350, 990 430, 1110 465"/>
    <path d="M1180 275 C1230 330, 1230 392, 1170 445"/>
    <path d="M1110 465 C935 545, 630 555, 420 440"/>
  </g>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" text-anchor="middle">
    <g>
      <circle cx="300" cy="250" r="76" fill="url(#node)"/>
      <text x="300" y="260" font-size="52">🏠</text>
      <text x="300" y="355" font-size="26" fill="#153057">Inicio</text>
    </g>
    <g>
      <circle cx="390" cy="430" r="68" fill="#9dc2ff"/>
      <text x="390" y="440" font-size="46">📰</text>
      <text x="390" y="520" font-size="24" fill="#153057">Blog</text>
    </g>
    <g>
      <circle cx="770" cy="250" r="94" fill="#2459c7"/>
      <text x="770" y="262" font-size="62">🌐</text>
      <text x="770" y="376" font-size="28" fill="#153057">PageRank alto</text>
    </g>
    <g>
      <circle cx="1160" cy="260" r="72" fill="#8bb8ff"/>
      <text x="1160" y="270" font-size="48">🎓</text>
      <text x="1160" y="360" font-size="24" fill="#153057">Cursos</text>
    </g>
    <g>
      <circle cx="1160" cy="470" r="62" fill="#bfd7ff"/>
      <text x="1160" y="480" font-size="40">✉️</text>
      <text x="1160" y="555" font-size="22" fill="#153057">Contacto</text>
    </g>
  </g>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="88" y="110" font-size="28" font-weight="700" fill="#2459c7">Matemáticas experimentales</text>
    <text x="88" y="164" font-size="58" font-weight="800" fill="#10213a">Explorando el algoritmo PageRank</text>
    <text x="88" y="214" font-size="28" fill="#4b5e7a">Grafos, matrices, teletransportación e iteraciones paso a paso.</text>
    <text x="88" y="598" font-size="34" font-weight="700" fill="#153057">p^(k+1) = αS p^(k) + (1-α)/n · 1</text>
  </g>
</svg>