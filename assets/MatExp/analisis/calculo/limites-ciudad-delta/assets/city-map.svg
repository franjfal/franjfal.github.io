<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 630" role="img" aria-labelledby="title desc">
  <title id="title">Mapa provisional de Ciudad Delta</title>
  <desc id="desc">Mapa con la Avenida del Río, un túnel sin cámaras entre t igual a 4 y t igual a 7, el enlace del Mirador, la rotonda del Laberinto y la salida de la ciudad.</desc>
  <rect width="960" height="630" fill="#f0ecdf"/>
  <g stroke="#d7d0c0" stroke-width="2">
    <path d="M80 70V570M180 70V570M280 70V570M380 70V570M480 70V570M580 70V570M680 70V570M780 70V570M880 70V570"/>
    <path d="M60 110H920M60 190H920M60 270H920M60 350H920M60 430H920M60 510H920"/>
  </g>
  <rect width="960" height="68" fill="#16242d"/>
  <text x="480" y="44" text-anchor="middle" fill="#f4f1e9" font-family="system-ui, sans-serif" font-size="30" font-weight="700">CIUDAD DELTA · MAPA PROVISIONAL</text>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M85 530 L295 445" stroke="#596167" stroke-width="42"/>
    <path d="M295 445 L485 355" stroke="#20272b" stroke-width="54"/>
    <path d="M485 355 L590 305" stroke="#596167" stroke-width="42"/>
    <path d="M590 305 L730 235" stroke="#596167" stroke-width="42"/>
    <path d="M590 305 L665 175 L765 235" stroke="#285b73" stroke-width="28"/>
    <path d="M730 235 L900 95" stroke="#596167" stroke-width="42"/>
    <g stroke="#f5c84c" stroke-width="5" stroke-dasharray="22 18">
      <path d="M85 530 L295 445"/>
      <path d="M485 355 L590 305 L730 235"/>
      <path d="M730 235 L900 95"/>
    </g>
  </g>

  <g font-family="system-ui, sans-serif" fill="#1f2933">
    <text x="88" y="485" font-size="21" font-weight="700">AVENIDA DEL RÍO</text>
    <text x="315" y="390" font-size="21" font-weight="700">TÚNEL DE LA RECTA</text>
    <text x="335" y="418" font-size="17">sin cámaras · 4 &lt; t &lt; 7</text>
    <text x="535" y="345" font-size="18" font-weight="700">ACCESO SUR</text>
    <text x="575" y="275" font-size="18" font-weight="700">ENLACE t=8</text>
    <text x="650" y="145" font-size="18" font-weight="700">ROTONDA DEL LABERINTO</text>
    <text x="805" y="180" font-size="18" font-weight="700">AUTOVÍA</text>
  </g>

  <g font-family="system-ui, sans-serif" font-size="15" font-weight="700">
    <g fill="#b7483f"><circle cx="285" cy="450" r="12"/><text x="267" y="480">E-07 · t=4</text></g>
    <g fill="#b7483f"><circle cx="495" cy="350" r="12"/><text x="472" y="385">E-08 · t=7</text></g>
    <g fill="#285b73"><circle cx="590" cy="305" r="12"/><text x="555" y="332">E-11 · t=8</text></g>
  </g>

  <g transform="translate(72 88)" font-family="system-ui, sans-serif">
    <rect width="205" height="104" rx="8" fill="#fff" stroke="#c8cfd4"/>
    <text x="15" y="28" font-size="16" font-weight="700" fill="#1f2933">LECTURA DEL MAPA</text>
    <line x1="18" y1="52" x2="88" y2="52" stroke="#596167" stroke-width="16" stroke-linecap="round"/>
    <text x="102" y="58" font-size="14" fill="#1f2933">carretera</text>
    <line x1="18" y1="82" x2="88" y2="82" stroke="#20272b" stroke-width="20" stroke-linecap="round"/>
    <text x="102" y="88" font-size="14" fill="#1f2933">túnel sin datos</text>
  </g>
</svg>
