<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" role="img" aria-labelledby="title description">
  <title id="title">Calculus Casebook: Expedientes de Cálculo</title>
  <desc id="description">Portada provisional del libro, con una carpeta de expediente y símbolos de cálculo.</desc>
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101a2b"/>
      <stop offset="1" stop-color="#273b59"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000" flood-opacity=".3"/>
    </filter>
  </defs>
  <rect width="800" height="1200" fill="url(#navy)"/>
  <circle cx="90" cy="120" r="270" fill="#d9a441" opacity=".12"/>
  <circle cx="760" cy="1100" r="330" fill="#c64a3f" opacity=".12"/>
  <g opacity=".08" fill="#fff" font-family="Georgia, serif">
    <text x="35" y="1070" font-size="90">f′(x)</text>
    <text x="480" y="180" font-size="70">∫ f(x) dx</text>
  </g>
  <text x="400" y="205" fill="#f7e8bd" font-family="system-ui, sans-serif" font-size="34" font-weight="700" text-anchor="middle" letter-spacing="7">EXPEDIENTES DE CÁLCULO</text>
  <text x="400" y="330" fill="#fffdf8" font-family="Georgia, serif" font-size="92" font-weight="700" text-anchor="middle">Calculus</text>
  <text x="400" y="430" fill="#fffdf8" font-family="Georgia, serif" font-size="92" font-weight="700" text-anchor="middle">Casebook</text>
  <g transform="translate(125 535)" filter="url(#shadow)">
    <path d="M25 80h225l55-60h245a25 25 0 0 1 25 25v420a25 25 0 0 1-25 25H25A25 25 0 0 1 0 465V105a25 25 0 0 1 25-25z" fill="#d9a441"/>
    <rect x="38" y="115" width="500" height="335" rx="14" fill="#fffdf8" transform="rotate(-3 288 282)"/>
    <text x="288" y="230" fill="#172235" font-family="system-ui, sans-serif" font-size="32" font-weight="800" text-anchor="middle" letter-spacing="4">CASO ABIERTO</text>
    <text x="288" y="345" fill="#c64a3f" font-family="Georgia, serif" font-size="105" font-weight="700" text-anchor="middle">∫ ↔ d</text>
    <path d="M135 385h305" stroke="#172235" stroke-width="5" opacity=".3"/>
  </g>
  <rect x="230" y="1090" width="340" height="52" rx="26" fill="#f7e8bd"/>
  <text x="400" y="1126" fill="#6f4b0b" font-family="system-ui, sans-serif" font-size="25" font-weight="800" text-anchor="middle" letter-spacing="3">EN PREPARACIÓN</text>
</svg>
