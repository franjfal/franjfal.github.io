<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Redirigiendo...</title>
    <script>
        // Solución para SPA en GitHub Pages: guarda la ruta intacta y redirige a index.html
        // GitHub Pages servirá este archivo en lugar de devolver 404 directo
        (function () {
            // Guarda la ruta solicitada en sessionStorage
            const url = window.location.pathname + window.location.search + window.location.hash;
            sessionStorage.setItem('redirect', url);

            // Redirige a index.html en la raíz de /gap/
            // El base href es /gap/, así que index.html está disponible en /gap/index.html
            window.location.replace('/gap/');
        })();
    </script>
</head>

<body>
    <p>Redirigiendo...</p>
</body>

</html>
