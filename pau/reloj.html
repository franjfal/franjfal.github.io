<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj digital PAU - Tribunal 7 (UV)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700&display=swap');

        :root {
            --bg-color: #0d0e12;
            --panel-bg: #161820;
            --text-main: #ffffff;
            --text-muted: #8e929b;
            --text-calm: #b0c4de;
            --border-subtle: #232733;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Lexend', system-ui, -apple-system, sans-serif;
            letter-spacing: -0.01em;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3vh 3vw;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        /* Cabecera Académica - Visible por defecto para mostrar Tribunal 7 */
        .header-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1vh;
        }

        .meta-academic {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: clamp(1rem, 1.8vh, 1.3rem);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .universidad-txt {
            font-weight: 400;
        }

        .separador {
            width: 4px;
            height: 4px;
            background-color: var(--text-muted);
            border-radius: 50%;
        }

        .tribunal-txt {
            font-weight: 700;
            color: var(--text-main);
            background-color: #202430;
            padding: 4px 12px;
            border-radius: 6px;
        }

        /* Oculto por defecto hasta elegir asignatura */
        .asignatura-title {
            font-size: clamp(1.6rem, 3.5vh, 2.8rem);
            font-weight: 500;
            line-height: 1.2;
            color: var(--text-main);
            max-width: 950px;
            text-align: center;
            display: none;
        }

        .reloj-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .reloj-digital {
            font-size: clamp(7rem, 28vh, 16rem);
            font-weight: 700;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            color: var(--text-main);
        }

        /* Contador oculto por defecto */
        .tiempo-restante-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5vh;
            min-height: 8vh;
            display: none;
        }

        .tiempo-restante-label {
            font-size: clamp(0.85rem, 1.5vh, 1.1rem);
            color: var(--text-muted);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tiempo-restante-valor {
            font-size: clamp(1.8rem, 4.5vh, 2.8rem);
            font-weight: 400;
            color: var(--text-calm);
            font-variant-numeric: tabular-nums;
        }

        /* Panel Desplegable */
        .config-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 35px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            display: none;
            /* Controlado estrictamente por JS */
        }

        .select-wrapper {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 10px;
        }

        label {
            font-size: 1rem;
            color: var(--text-muted);
        }

        select {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid #333a4d;
            padding: 16px;
            font-size: 1.05rem;
            border-radius: 10px;
            outline: none;
            width: 100%;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%238e929b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
        }

        .btn {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn:hover {
            background-color: #e2e8f0;
        }

        .btn-menu {
            background-color: transparent;
            border: 1px solid #333a4d;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            position: absolute;
            bottom: 0;
            right: 0;
            z-index: 150;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-menu:hover {
            border-color: var(--text-muted);
            color: var(--text-main);
            background-color: #161820;
        }

        .fullscreen-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 60;
        }
    </style>
</head>

<body>

    <div class="container">

        <button class="fullscreen-btn" id="fullscreenBtn" title="Pantalla Completa">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
            </svg>
        </button>

        <!-- Cabecera Académica Permanente -->
        <div class="header-info">
            <div class="meta-academic">
                <span class="universidad-txt">Universitat de València</span>
                <span class="separador"></span>
                <span class="tribunal-txt">Tribunal 7</span>
            </div>
            <!-- Dinámico -->
            <div class="asignatura-title" id="nombreAsignatura"></div>
        </div>

        <!-- Reloj Central Activo desde el primer instante -->
        <div class="reloj-container">
            <div class="reloj-digital" id="reloj">--:--</div>
        </div>

        <!-- Tiempo Restante Dinámico -->
        <div class="tiempo-restante-container" id="tiempoRestanteCont">
            <div class="tiempo-restante-label" id="timerLabel">Tiempo restante de examen</div>
            <div class="tiempo-restante-valor" id="timerValor">90 min</div>
        </div>

        <!-- Botón único multifunción -->
        <button class="btn-menu" id="btnMenu">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" y1="12" x2="20" y2="12"></line>
                <line x1="4" y1="6" x2="20" y2="6"></line>
                <line x1="4" y1="18" x2="20" y2="18"></line>
            </svg>
            <span id="btnMenuTexto">Elegir Asignatura</span>
        </button>

    </div>

    <!-- Panel de Selección -->
    <div class="config-panel" id="configPanel">
        <div class="select-wrapper">
            <label for="examenSelect">Asignaturas y turnos programados (Convocatoria Junio 2026)</label>
            <select id="examenSelect"></select>
        </div>
        <button class="btn" id="btnAceptar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            Confirmar e Iniciar Turno (90 min)
        </button>
    </div>

    <script>
        const horarioPAU = [
            { id: 1, dia: 2, fechaStr: "Martes 2 de Junio", hora: "09:30", asignatura: "Lengua Castellana y Literatura II (CAST)" },
            { id: 2, dia: 2, fechaStr: "Martes 2 de Junio", hora: "11:45", asignatura: "Historia de la Filosofía (HFIL)" },
            { id: 3, dia: 2, fechaStr: "Martes 2 de Junio", hora: "15:30", asignatura: "Biología (BIOL) / Empresa y Diseños de Negocio (EMDI) / Tecnología e Ingeniería II (TEIN) / Historia de la Música (HMUS) / Fundamentos Artísticos (FUAR)" },
            { id: 4, dia: 2, fechaStr: "Martes 2 de Junio", hora: "17:45", asignatura: "Física (FISI) / Historia del Arte (HART) / Coro y Técnica Vocal II (COTE) / Diseño (DISE)" },

            { id: 5, dia: 3, fechaStr: "Miércoles 3 de Junio", hora: "09:30", asignatura: "Lengua Extranjera II (INGL / FRAN / ALEM / ITAL)" },
            { id: 6, dia: 3, fechaStr: "Miércoles 3 de Junio", hora: "11:45", asignatura: "Historia de España (HESP)" },
            { id: 7, dia: 3, fechaStr: "Miércoles 3 de Junio", hora: "15:30", asignatura: "Química (QUIM) / Literatura Dramática (LITE) / Movimientos Culturales (MOCA) / Geografía (GEOG) / Dibujo Técnico Aplicado II (DTAP)" },
            { id: 8, dia: 3, fechaStr: "Miércoles 3 de Junio", hora: "17:45", asignatura: "Dibujo Técnico II (DITE) / Griego II (GRIE) / Técnicas de Expresión Graficoplástica (TEXP) / Geología y Ciencias Ambientales (GECA)" },

            { id: 9, dia: 4, fechaStr: "Jueves 4 de Junio", hora: "09:30", asignatura: "Valenciano: Lengua y Literatura II (VALE)" },
            { id: 10, dia: 4, fechaStr: "Jueves 4 de Junio", hora: "11:45", asignatura: "Dibujo Artístico II (DART) / Artes Escénicas II (ARES) / Análisis Musical II (ANMU) / Matemáticas II (MATE) / Matemáticas Aplicadas CCSS II (MACS) / Latín II (LATI) / Ciencias Generales (CIGE)" }
        ];

        const DURACION_EXAMEN_MINUTOS = 90;
        let finExamenTime = null;
        let timerInterval = null;
        let wakeLock = null;
        let examenIniciado = false;

        // Elementos del DOM
        const relojEl = document.getElementById('reloj');
        const examenSelect = document.getElementById('examenSelect');
        const configPanel = document.getElementById('configPanel');
        const btnAceptar = document.getElementById('btnAceptar');
        const btnMenu = document.getElementById('btnMenu');
        const btnMenuTexto = document.getElementById('btnMenuTexto');
        const nombreAsignatura = document.getElementById('nombreAsignatura');
        const tiempoRestanteCont = document.getElementById('tiempoRestanteCont');
        const timerValor = document.getElementById('timerValor');
        const timerLabel = document.getElementById('timerLabel');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // Función Anti-reposo
        async function solicitarModoNoReposo() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { }
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') solicitarModoNoReposo();
        });

        // Reloj Real Inmediato
        function actualizarRelojAula() {
            const ahora = new Date();
            relojEl.textContent = ahora.getHours().toString().padStart(2, '0') + ':' + ahora.getMinutes().toString().padStart(2, '0');
        }
        setInterval(actualizarRelojAula, 1000);
        actualizarRelojAula(); // Ejecución síncrona inmediata al cargar

        function poblarDesplegable() {
            horarioPAU.forEach(ex => {
                const option = document.createElement('option');
                option.value = ex.id;
                option.textContent = `${ex.fechaStr} — ${ex.hora} h — ${ex.asignatura}`;
                examenSelect.appendChild(option);
            });
        }

        function preseleccionarExamenOptimo() {
            const ahora = new Date();
            if (ahora.getMonth() === 5) {
                const examenesHoy = horarioPAU.filter(ex => ex.dia === ahora.getDate());
                if (examenesHoy.length > 0) {
                    const minutosActuales = (ahora.getHours() * 60) + ahora.getMinutes();
                    examenesHoy.forEach(ex => {
                        const [exHora, exMin] = ex.hora.split(':').map(Number);
                        const minutosExamen = (exHora * 60) + exMin;
                        if ((minutosActuales - minutosExamen) >= -30 && (minutosActuales - minutosExamen) < DURACION_EXAMEN_MINUTOS) {
                            examenSelect.value = ex.id;
                        }
                    });
                }
            }
        }

        function actualizarCuentaAtras() {
            if (!finExamenTime) return;
            const diferenciaMili = finExamenTime - new Date().getTime();

            if (diferenciaMili <= 0) {
                clearInterval(timerInterval);
                timerValor.textContent = "Convocatoria finalizada";
                timerLabel.textContent = "Control de Aula";
                return;
            }

            const minutosRestantes = Math.ceil(diferenciaMili / (1000 * 60));
            if (minutosRestantes > 60) {
                const hrs = Math.floor(minutosRestantes / 60);
                const mins = minutosRestantes % 60;
                timerValor.textContent = mins === 0 ? `${hrs} h` : `${hrs} h y ${mins} min`;
            } else {
                timerValor.textContent = `${minutosRestantes} min`;
            }
        }

        // Evento del Botón Inferior Derecho (Alterna la visualización del menú)
        btnMenu.addEventListener('click', () => {
            if (configPanel.style.display === 'flex') {
                configPanel.style.display = 'none';
            } else {
                configPanel.style.display = 'flex';
            }
        });

        // Evento al Confirmar la Asignatura
        btnAceptar.addEventListener('click', () => {
            const exId = parseInt(examenSelect.value);
            const examenAsignado = horarioPAU.find(ex => ex.id === exId);
            if (!examenAsignado) return;

            configPanel.style.display = 'none';

            // Mostrar elementos de la asignatura e iniciar contador
            nombreAsignatura.textContent = examenAsignado.asignatura;
            nombreAsignatura.style.display = 'block';

            finExamenTime = new Date().getTime() + (DURACION_EXAMEN_MINUTOS * 60 * 1000);
            tiempoRestanteCont.style.display = 'flex';
            timerLabel.textContent = "Tiempo restante de examen";

            actualizarCuentaAtras();
            clearInterval(timerInterval);
            timerInterval = setInterval(actualizarCuentaAtras, 15000);

            // Cambiar dinámicamente la etiqueta del botón
            examenIniciado = true;
            btnMenuTexto.textContent = "Cambiar Asignatura";

            solicitarModoNoReposo();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => { });
            } else {
                document.exitFullscreen();
            }
        });

        // Inicialización segura del sistema
        poblarDesplegable();
        preseleccionarExamenOptimo();
    </script>
</body>

</html>
